name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Creates/updates the release PR and tags versioned releases.
  # Outputs release_created=true when a version PR was merged.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: rust

  build:
    name: Build (${{ matrix.artifact }})
    needs: release-please
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: pokemon-colorscripts-linux-x86_64
            binary: target/release/pokemon-colorscripts

          - os: macos-latest          # universal binary (arm64 + x86_64)
            artifact: pokemon-colorscripts-macos-universal
            binary: pokemon-colorscripts-macos-universal

          - os: windows-latest
            artifact: pokemon-colorscripts-windows-x86_64.exe
            binary: target/release/pokemon-colorscripts.exe

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Add macOS cross-compilation targets
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Build
        if: runner.os != 'macOS'
        run: cargo build --release --bin pokemon-colorscripts

      - name: Build universal binary (macOS)
        if: runner.os == 'macOS'
        run: |
          cargo build --release --bin pokemon-colorscripts --target aarch64-apple-darwin
          cargo build --release --bin pokemon-colorscripts --target x86_64-apple-darwin
          lipo -create -output pokemon-colorscripts-macos-universal \
            target/aarch64-apple-darwin/release/pokemon-colorscripts \
            target/x86_64-apple-darwin/release/pokemon-colorscripts

      - name: Stage artifact
        if: runner.os != 'macOS'
        shell: bash
        run: cp ${{ matrix.binary }} ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  publish:
    name: Publish
    needs: [release-please, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4.3.0
        with:
          merge-multiple: true

      # Always update the rolling "latest" pre-release
      - name: Update latest pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          prerelease: true
          make_latest: false
          body: |
            Automated build from the latest commit on `main`.

            | File | Platform |
            |------|----------|
            | `pokemon-colorscripts-linux-x86_64` | Linux x86_64 |
            | `pokemon-colorscripts-macos-universal` | macOS (Apple Silicon + Intel) |
            | `pokemon-colorscripts-windows-x86_64.exe` | Windows x86_64 |
          files: pokemon-colorscripts-*

      # On a versioned release: also attach binaries to it
      - name: Attach binaries to versioned release
        if: needs.release-please.outputs.release_created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: pokemon-colorscripts-*
